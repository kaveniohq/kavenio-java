      description: "Retries failed platform targets for a post, optionally limited\
        \ to specific target IDs."
      operationId: retryPost
      parameters:
      - explode: false
        in: path
        name: postId
        required: true
        schema:
          maxLength: 16
          minLength: 16
          pattern: "^[abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ]{16}$"
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            example:
              targetIds:
              - gggggggggggggggg
            schema:
              $ref: "#/components/schemas/retryPost_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/createPost_201_response"
          description: Post retry started.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Authentication failed.
        "404":
          content:
