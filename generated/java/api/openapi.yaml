        schema:
          maxLength: 16
          minLength: 16
          pattern: "^[abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ]{16}$"
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/deletePost_200_response"
          description: Post deleted.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Authentication failed.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Post not found.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Post cannot be deleted in its current state.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Path parameter validation failed.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Post deletion failed.
      summary: Delete a post
      tags:
      - Posts
      x-mint:
        metadata:
          title: Delete post
      x-accepts:
      - application/json
    get:
      description: "Returns a post by ID, including platform target state."
      operationId: getPost
      parameters:
      - explode: false
        in: path
        name: postId
        required: true
        schema:
          maxLength: 16
          minLength: 16
          nullable: true
          pattern: "^[abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ]{16}$"
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/createPost_201_response"
          description: Post returned.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Authentication failed.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Post not found.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Path parameter validation failed.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Post lookup failed.
      summary: Get a post
      tags:
      - Posts
      x-mint:
        metadata:
          title: Get post
      x-accepts:
      - application/json
    patch:
      description: Partially updates editable fields on an existing post and returns
        the resulting post state.
      operationId: updatePost
      parameters:
      - explode: false
        in: path
        name: postId
        required: true
        schema:
          maxLength: 16
          minLength: 16
          pattern: "^[abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ]{16}$"
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            example:
              content: Updated post body.
            schema:
              $ref: "#/components/schemas/replacePost_request"
