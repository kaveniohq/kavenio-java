openapi: 3.1.0
info:
  description: "Generated OpenAPI document for Kavenio SDKs that support social posting,\
    \ media, account connection, validation, and scheduling workflows."
  license:
    name: Proprietary
    url: https://kavenio.com/terms
  title: Kavenio Social Posting SDK API
  version: 1.0.0
servers:
- url: https://api.kavenio.com
security:
- bearerAuth: []
tags:
- description: Manage customer-owned profile groupings.
  name: Profiles
- description: "Create, schedule, update, and manage post lifecycle actions."
  name: Posts
- description: Manage reusable post queue schedules and preview slots.
  name: Queue
- description: "Upload, presign, and validate media assets."
  name: Media
- description: Validate post payloads and platform content length limits.
  name: Validation
- description: Start and complete account connection flows.
  name: Connect
- description: Manage connected social accounts and account health.
  name: Accounts
paths:
  /v1/profiles:
    get:
      description: Returns the profiles available to the authenticated organization.
      operationId: listProfiles
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_200_response"
          description: Profiles returned.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Authentication failed.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Profile lookup failed.
      summary: List profiles
      tags:
      - Profiles
      x-mint:
        metadata:
          title: List profiles
      x-accepts:
      - application/json
    post:
      description: Creates a customer-owned profile grouping.
      operationId: createProfile
      requestBody:
        content:
          application/json:
            example:
              name: Retail campaigns
              description: Campaigns managed by the retail team.
              color: "#2563eb"
              isDefault: false
            schema:
              $ref: "#/components/schemas/createProfile_request"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/createProfile_201_response"
          description: Profile created.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Authentication failed.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: A profile with this name already exists.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Request body validation failed.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Profile creation failed.
      summary: Create a profile
      tags:
      - Profiles
      x-mint:
        metadata:
          title: Create profile
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/profiles/{profileId}:
    delete:
      description: Deletes a customer-owned profile grouping.
      operationId: deleteProfile
      parameters:
      - explode: false
        in: path
        name: profileId
        required: true
        schema:
          maxLength: 16
          minLength: 16
          pattern: "^[abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ]{16}$"
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/deleteProfile_200_response"
          description: Profile deleted.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Authentication failed.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Profile not found.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Profile cannot be deleted in its current state.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Path parameter validation failed.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Profile deletion failed.
      summary: Delete a profile
      tags:
      - Profiles
      x-mint:
        metadata:
          title: Delete profile
      x-accepts:
      - application/json
    get:
      description: Returns one profile by ID.
      operationId: getProfile
      parameters:
      - explode: false
        in: path
        name: profileId
        required: true
        schema:
          maxLength: 16
          minLength: 16
          nullable: true
          pattern: "^[abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ]{16}$"
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/createProfile_201_response"
          description: Profile returned.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Authentication failed.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Profile not found.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Path parameter validation failed.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Profile lookup failed.
      summary: Get a profile
      tags:
      - Profiles
      x-mint:
        metadata:
          title: Get profile
      x-accepts:
      - application/json
    patch:
      description: Partially updates profile fields for an existing customer-owned
        grouping.
      operationId: updateProfile
      parameters:
      - explode: false
        in: path
        name: profileId
        required: true
        schema:
          maxLength: 16
          minLength: 16
          pattern: "^[abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ]{16}$"
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            example:
              description: null
              isDefault: true
            schema:
              $ref: "#/components/schemas/replaceProfile_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/createProfile_201_response"
          description: Profile updated.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Authentication failed.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Profile not found.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: A profile with this name already exists.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Request validation failed.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Profile update failed.
      summary: Update a profile
      tags:
      - Profiles
      x-mint:
        metadata:
          title: Update profile
      x-content-type: application/json
      x-accepts:
      - application/json
    put:
      description: Updates profile fields for an existing customer-owned grouping.
      operationId: replaceProfile
      parameters:
      - explode: false
        in: path
        name: profileId
        required: true
        schema:
          maxLength: 16
          minLength: 16
          pattern: "^[abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ]{16}$"
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            example:
              name: Retail campaigns
              description: Updated profile description.
              color: "#0f766e"
              isDefault: true
            schema:
              $ref: "#/components/schemas/replaceProfile_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/createProfile_201_response"
          description: Profile updated.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Authentication failed.
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Profile not found.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: A profile with this name already exists.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Request validation failed.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Profile update failed.
      summary: Replace profile fields
      tags:
      - Profiles
      x-mint:
        metadata:
          title: Replace profile
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/posts:
    get:
      description: "Returns posts for the authenticated organization, optionally filtered\
        \ by profile, account, platform, status, search text, or date range."
      operationId: listPosts
      parameters:
      - explode: true
        in: query
        name: profileId
        required: false
        schema:
          maxLength: 16
          minLength: 16
          nullable: true
          pattern: "^[abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ]{16}$"
          type: string
        style: form
      - explode: true
        in: query
        name: accountId
        required: false
        schema:
          maxLength: 16
          minLength: 16
          nullable: true
          pattern: "^[abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ]{16}$"
          type: string
        style: form
      - explode: true
        in: query
        name: platform
        required: false
        schema:
          enum:
          - twitter
          - pinterest
          - linkedin
          - bluesky
          - mastodon
          - reddit
          - telegram
          - youtube
          - facebook
          - instagram
          - threads
          - tiktok
          - googlebusiness
          type: string
        style: form
      - explode: true
        in: query
        name: status
        required: false
        schema:
          enum:
          - draft
          - scheduled
          - publishing
          - published
          - unpublished
          - failed
          - partial
          - cancelled
          type: string
        style: form
      - explode: true
        in: query
        name: search
        required: false
        schema:
          minLength: 1
          type: string
        style: form
      - explode: true
        in: query
        name: fromDate
        required: false
        schema:
          format: date-time
          pattern: "^(?:(?:\\d\\d[2468][048]|\\d\\d[13579][26]|\\d\\d0[48]|[02468][048]00|[13579][26]00)-02-29|\\\
            d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\\\
            d|30)|(?:02)-(?:0[1-9]|1\\d|2[0-8])))T(?:(?:[01]\\d|2[0-3]):[0-5]\\d(?::[0-5]\\\
            d(?:\\.\\d+)?)?(?:Z))$"
          type: string
        style: form
      - explode: true
        in: query
        name: toDate
        required: false
        schema:
          format: date-time
          nullable: true
          pattern: "^(?:(?:\\d\\d[2468][048]|\\d\\d[13579][26]|\\d\\d0[48]|[02468][048]00|[13579][26]00)-02-29|\\\
            d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\\\
            d|30)|(?:02)-(?:0[1-9]|1\\d|2[0-8])))T(?:(?:[01]\\d|2[0-3]):[0-5]\\d(?::[0-5]\\\
            d(?:\\.\\d+)?)?(?:Z))$"
          type: string
        style: form
      - explode: true
        in: query
        name: page
        required: false
        schema:
          maximum: 9007199254740991
          minimum: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          maximum: 100
          minimum: 1
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listPosts_200_response"
          description: Posts returned.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Authentication failed.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Query parameter validation failed.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Post lookup failed.
      summary: List posts
      tags:
      - Posts
      x-mint:
        metadata:
          title: List posts
      x-accepts:
      - application/json
    post:
      description: "Creates a draft, scheduled post, queue-backed post, or immediate\
        \ publish request depending on the payload fields."
      operationId: createPost
      requestBody:
        content:
          application/json:
            example:
              profileId: aaaaaaaaaaaaaaaa
              title: Launch announcement
              content: We are launching the new campaign today.
              platforms:
              - platform: linkedin
                accountId: bbbbbbbbbbbbbbbb
              scheduledFor: 2026-06-25T15:00:00.000Z
              timezone: UTC
              tags:
              - launch
            schema:
              $ref: "#/components/schemas/createPost_request"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/createPost_201_response"
          description: Post created.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Authentication failed.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Post request conflicts with current state.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Request body validation failed.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Post creation failed.
      summary: Create a post
      tags:
      - Posts
      x-mint:
        metadata:
          title: Create post
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/posts/bulk-upload:
    post:
      description: Creates posts from CSV content and returns per-row creation or
        validation results.
      operationId: bulkUploadPosts
      requestBody:
        content:
          application/json:
            example:
              csv: |-
                title,content,scheduledFor
                Launch,Post body,2026-06-25T15:00:00.000Z
              defaults:
                profileId: aaaaaaaaaaaaaaaa
                timezone: UTC
            schema:
              $ref: "#/components/schemas/bulkUploadPosts_request"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bulkUploadPosts_201_response"
          description: Bulk upload processed.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Authentication failed.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Request body validation failed.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listProfiles_401_response"
          description: Bulk upload failed.
      summary: Bulk upload posts
      tags:
      - Posts
      x-mint:
        metadata:
          title: Bulk upload posts
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/posts/{postId}:
    delete:
      description: Deletes a post by ID and returns the deletion count.
